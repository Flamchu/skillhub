name: Deploy

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: deploy to hetzner
    env:
      NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_MEDIA_URL: ${{ vars.NEXT_PUBLIC_MEDIA_URL }}
      NEXT_PUBLIC_DEFAULT_THEME: ${{ vars.NEXT_PUBLIC_DEFAULT_THEME }}
      NEXT_PUBLIC_ENABLE_ANALYTICS: ${{ vars.NEXT_PUBLIC_ENABLE_ANALYTICS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: image-meta
        run: |
          GHCR_NAMESPACE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "ghcr_namespace=${GHCR_NAMESPACE}" >> "${GITHUB_OUTPUT}"
          echo "backend_image=${GHCR_NAMESPACE}/backend" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${GHCR_NAMESPACE}/frontend" >> "${GITHUB_OUTPUT}"
          echo "ai_service_image=${GHCR_NAMESPACE}/ai-service" >> "${GITHUB_OUTPUT}"

      - name: Validate required frontend build args
        run: |
          set -euo pipefail
          required_vars=(
            NEXT_PUBLIC_BACKEND_URL
            NEXT_PUBLIC_SITE_URL
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required build input: ${var_name}"
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image-meta.outputs.backend_image }}:master
            ${{ steps.image-meta.outputs.backend_image }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push ai-service image
        uses: docker/build-push-action@v6
        with:
          context: ai-service
          file: ai-service/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image-meta.outputs.ai_service_image }}:master
            ${{ steps.image-meta.outputs.ai_service_image }}:${{ github.sha }}
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,mode=max,scope=ai-service

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image-meta.outputs.frontend_image }}:master
            ${{ steps.image-meta.outputs.frontend_image }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ env.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_MEDIA_URL=${{ env.NEXT_PUBLIC_MEDIA_URL }}
            NEXT_PUBLIC_DEFAULT_THEME=${{ env.NEXT_PUBLIC_DEFAULT_THEME }}
            NEXT_PUBLIC_ENABLE_ANALYTICS=${{ env.NEXT_PUBLIC_ENABLE_ANALYTICS }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Deploy on Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/skillhub
            git fetch origin dev
            git checkout dev
            git pull --ff-only origin dev
            export IMAGE_TAG=master
            export GHCR_NAMESPACE=${{ steps.image-meta.outputs.ghcr_namespace }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml run --rm --no-deps backend pnpm prisma:migrate:deploy
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
