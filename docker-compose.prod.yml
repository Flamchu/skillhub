services:
  # s3-compatible storage (minio)
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: skillhub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # redis cache
  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # local ai service (sentence-transformer)
  ai-service:
    image: ${GHCR_NAMESPACE:?GHCR_NAMESPACE is required}/ai-service:${IMAGE_TAG:-master}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: skillhub-ai-service
    restart: unless-stopped
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M

  # backend api
  backend:
    image: ${GHCR_NAMESPACE:?GHCR_NAMESPACE is required}/backend:${IMAGE_TAG:-master}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: skillhub-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LOCAL_AI_SERVICE_URL: ${LOCAL_AI_SERVICE_URL:-http://ai-service:5000}
      AI_SERVICE_ENABLED: ${AI_SERVICE_ENABLED:-true}
      UDEMY_CLIENT_ID: ${UDEMY_CLIENT_ID:-}
      UDEMY_CLIENT_SECRET: ${UDEMY_CLIENT_SECRET:-}
      UDEMY_AFFILIATE_ID: ${UDEMY_AFFILIATE_ID:-}
      FRONTEND_URL: ${FRONTEND_URL}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-skillhub-media}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  # frontend web app
  frontend:
    image: ${GHCR_NAMESPACE:?GHCR_NAMESPACE is required}/frontend:${IMAGE_TAG:-master}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: skillhub-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_MEDIA_URL: ${NEXT_PUBLIC_MEDIA_URL}
      NEXT_PUBLIC_DEFAULT_THEME: ${NEXT_PUBLIC_DEFAULT_THEME:-system}
      NEXT_PUBLIC_ENABLE_ANALYTICS: ${NEXT_PUBLIC_ENABLE_ANALYTICS:-false}
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  skillhub-network:
    driver: bridge
