version: "3.9"

services:
  # redis cache
  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # local ai service (sentence-transformer)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: skillhub-ai-service
    restart: unless-stopped
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ai-service:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M

  # backend api
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: skillhub-backend
    restart: unless-stopped
    depends_on:
      - redis
      - ai-service
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LOCAL_AI_SERVICE_URL: ${LOCAL_AI_SERVICE_URL:-http://ai-service:5000}
      AI_SERVICE_ENABLED: ${AI_SERVICE_ENABLED:-true}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - skillhub-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  # frontend web app
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    container_name: skillhub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    networks:
      - skillhub-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

volumes:
  redis_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  skillhub-network:
    driver: bridge
